# 🌐 Configuração do Proxy Reverso Nginx para Dify
# Mapeamento do subdomínio: https://automatiza.cdc.org.br/

server {
    listen 80;
    server_name automatiza.cdc.org.br;

    # Redirecionar HTTP para HTTPS (Descomente após gerar os certificados SSL com Certbot)
    # return 301 https://$host$request_uri;

    client_max_body_size 15M; # Permitir upload de documentos maiores na Wiki/RAG

    # Proxy para o Frontend Web do Dify (Console e Chat Web)
    location / {
        proxy_pass http://localhost:80; # Direciona para a porta do container dify-web exposta na máquina
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para a API do Dify (Console Back-end)
    location /console/api/ {
        proxy_pass http://localhost:5001/console/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para a API de Aplicação
    location /api/ {
        proxy_pass http://localhost:5001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para endpoints de API v1 (utilizados por Webhooks/Pontes externas)
    location /v1/ {
        proxy_pass http://localhost:5001/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
