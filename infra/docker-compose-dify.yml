# 🐳 Docker Compose para Instalação Self-Hosted do Dify
# Este arquivo configura os serviços centrais da plataforma Dify.

services:
  # Banco de Dados Relacional (PostgreSQL)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: dify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: <POSTGRES_PASSWORD_REPLACE_ME>
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Cache e Filas de Mensagens (Redis)
  redis:
    image: redis:6-alpine
    restart: always
    volumes:
      - redisdata:/data

  # API Backend do Dify
  api:
    image: langgenius/dify-api:latest
    restart: always
    environment:
      INIT_DB: "true"
      DB_USERNAME: postgres
      DB_PASSWORD: <POSTGRES_PASSWORD_REPLACE_ME>
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_WORKER_MAX_TASKS_PER_CHILD: 10
      SECRET_KEY: <GENERATE_SECRET_KEY_REPLACE_ME>
    depends_on:
      - db
      - redis

  # Interface Frontend Web do Dify
  web:
    image: langgenius/dify-web:latest
    restart: always
    environment:
      CONSOLE_API_URL: https://automatiza.cdc.org.br
      APP_API_URL: https://automatiza.cdc.org.br
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
